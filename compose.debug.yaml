services:
  smartlogixbackend:
    image: smartlogixbackend
    build:
      context: backend
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: development
      PORT: 5003
    ports:
      - 5003:5003
      - 9229:9229
    command: ["node", "--inspect=0.0.0.0:9229", "server.js"]
